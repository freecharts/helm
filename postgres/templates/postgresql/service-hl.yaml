apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-hl" (include "helper.names.fullname" .) }}
  namespace: {{ include "helper.names.namespace" . }}
  labels:
    {{- include "helper.labels.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    role: data
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: {{ .Values.postgresql.headlessWithNotReadyAddresses }}
  selector:
    {{- include "helper.labels.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    role: data
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      targetPort: postgresql
      protocol: TCP